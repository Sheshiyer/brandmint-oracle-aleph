# Publish Brandmint Desktop — macOS (Tauri v2)
#
# Builds the Tauri desktop app on macOS and uploads .dmg + .app.zip
# plus the signed OTA updater payload (`.app.tar.gz`, `.sig`, `latest.json`)
# to both Cloudflare R2 (primary OTA channel) and the triggering GitHub Release.
#
# Triggers alongside publish-ghcr.yml and update-homebrew-tap.yml
# on the same `release: published` event.
#
# ── Signing & Notarization ──
# For unsigned internal/dev builds: no extra secrets needed.
# For signed distribution builds, set these repository secrets:
#   APPLE_CERTIFICATE        — Base64-encoded .p12 Developer ID certificate
#   APPLE_CERTIFICATE_PASSWORD — Password for the .p12 file
#   APPLE_SIGNING_IDENTITY   — e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                 — Apple ID email for notarization
#   APPLE_PASSWORD           — App-specific password for notarization
#   APPLE_TEAM_ID            — 10-char Apple Developer Team ID
#
# When these secrets are absent the build proceeds unsigned.
# The workflow intentionally builds the `.app` bundle first and then
# creates the DMG with `hdiutil` so CI does not depend on Finder/AppleScript.
# The `.app` can be signed during build; notarization/stapling of release assets
# remains an operator decision for public distribution.
#
# ── OTA Hosting ──────────────────────────────────────────────────
# OTA update assets are published to Cloudflare R2 so the app can update in-place
# without replacing DMGs manually. For published releases, set:
#   CLOUDFLARE_API_TOKEN   — token with R2 object write access for Brandmint updater bucket
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id containing the bucket
# The app prefers `brandmintupdates.thoughtseed.space` and falls back to the live
# `r2.dev` URL until the custom domain finishes activation.

name: Publish Brandmint Desktop (macOS)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach artifacts to (leave empty for artifact-only build)"
        required: false

permissions:
  contents: write

env:
  BRANDMINT_UPDATE_PRIMARY_BASE_URL: https://brandmintupdates.thoughtseed.space
  BRANDMINT_UPDATE_BASE_URL: https://pub-1a0540bfbd114ca7aa86f0abdfbe154f.r2.dev
  BRANDMINT_UPDATE_CHANNEL: stable
  BRANDMINT_UPDATE_BUCKET: brandmint-updater
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ──────────────────────────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ui/src-tauri/target
          key: macos-cargo-${{ hashFiles('ui/src-tauri/Cargo.lock') }}
          restore-keys: macos-cargo-

      # ── Apple Code Signing (optional) ──────────────────────────

      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── Build ──────────────────────────────────────────────────

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate OTA signing configuration
        if: github.event_name == 'release'
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is required for published OTA assets."
            exit 1
          fi

      - name: Validate Cloudflare OTA publish configuration
        if: github.event_name == 'release'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || '' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '' }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is required for published OTA uploads."
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID secret is required for published OTA uploads."
            exit 1
          fi

      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}
        run: npm run tauri:build -- --bundles app --target aarch64-apple-darwin

      # ── Package artifacts ──────────────────────────────────────

      - name: Resolve version
        id: version
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          BUNDLE_ROOT="src-tauri/target/aarch64-apple-darwin/release/bundle"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "bundle_root=$BUNDLE_ROOT" >> "$GITHUB_OUTPUT"
          echo "Building Brandmint v$VERSION"

      - name: Locate build artifacts
        id: artifacts
        run: |
          BUNDLE_ROOT="${{ steps.version.outputs.bundle_root }}"
          APP="$BUNDLE_ROOT/macos/Brandmint.app"

          if [ ! -d "$APP" ]; then echo "::error::.app bundle not found at $APP"; exit 1; fi

          echo "app=$APP" >> "$GITHUB_OUTPUT"
          echo "Found APP: $APP"

      - name: Locate updater artifacts
        id: updater
        run: |
          BUNDLE_ROOT="${{ steps.version.outputs.bundle_root }}"
          ARCHIVE="$(find "$BUNDLE_ROOT" -type f -name '*.app.tar.gz' | head -n 1)"
          SIGNATURE="$(find "$BUNDLE_ROOT" -type f -name '*.app.tar.gz.sig' | head -n 1)"
          MANIFEST="$(find "$BUNDLE_ROOT" -type f -name 'latest.json' | head -n 1)"

          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            if [ ! -f "$ARCHIVE" ]; then echo "::error::Updater archive not found under $BUNDLE_ROOT"; exit 1; fi
            if [ ! -f "$SIGNATURE" ]; then echo "::error::Updater signature not found under $BUNDLE_ROOT"; exit 1; fi
            if [ ! -f "$MANIFEST" ]; then echo "::error::Updater manifest not found under $BUNDLE_ROOT"; exit 1; fi
            echo "Found updater archive: $ARCHIVE"
            echo "Found updater signature: $SIGNATURE"
            echo "Found updater manifest: $MANIFEST"
          else
            echo "No OTA signing key configured; updater artifacts are optional for this run."
          fi

          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "signature=$SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"

      - name: Upload OTA artifacts to Cloudflare R2
        if: steps.updater.outputs.archive != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || '' }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || '' }}
        run: |
          bash scripts/upload_updater_artifacts_to_r2.sh \
            --bundle-root "${{ steps.version.outputs.bundle_root }}" \
            --channel "${BRANDMINT_UPDATE_CHANNEL}"

      - name: Archive .app bundle
        id: archive
        run: |
          VERSION=${{ steps.version.outputs.version }}
          APP_PATH="${{ steps.artifacts.outputs.app }}"
          ZIP_NAME="Brandmint_${VERSION}_macos-aarch64.app.zip"
          ZIP_PATH="${{ steps.version.outputs.bundle_root }}/${ZIP_NAME}"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "zip=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME" >> "$GITHUB_OUTPUT"
          echo "Archived: $ZIP_PATH ($(du -h "$ZIP_PATH" | cut -f1))"

      - name: Create DMG with stable name
        id: dmg
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DMG_NAME="Brandmint_${VERSION}_macos-aarch64.dmg"
          DMG_PATH="${{ steps.version.outputs.bundle_root }}/${DMG_NAME}"
          STAGING_DIR="$RUNNER_TEMP/brandmint-dmg"
          STAGING_APP_DIR="$STAGING_DIR/Brandmint"

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_APP_DIR"
          ditto "${{ steps.artifacts.outputs.app }}" "$STAGING_APP_DIR/Brandmint.app"
          ln -s /Applications "$STAGING_APP_DIR/Applications"

          hdiutil create -ov \
            -volname "Brandmint" \
            -srcfolder "$STAGING_APP_DIR" \
            -fs HFS+ \
            -format UDZO \
            "$DMG_PATH"

          echo "dmg=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "Created: $DMG_PATH ($(du -h "$DMG_PATH" | cut -f1))"

      # ── Upload ─────────────────────────────────────────────────

      - name: Upload artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ui/${{ steps.dmg.outputs.dmg }}
            ui/${{ steps.archive.outputs.zip }}
            ui/${{ steps.updater.outputs.archive }}
            ui/${{ steps.updater.outputs.signature }}
            ui/${{ steps.updater.outputs.manifest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (workflow_dispatch — no release)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: brandmint-macos-${{ steps.version.outputs.version }}
          path: |
            ui/${{ steps.dmg.outputs.dmg }}
            ui/${{ steps.archive.outputs.zip }}
          retention-days: 14

      - name: Upload OTA artifacts (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && steps.updater.outputs.archive != ''
        uses: actions/upload-artifact@v4
        with:
          name: brandmint-macos-ota-${{ steps.version.outputs.version }}
          path: |
            ui/${{ steps.updater.outputs.archive }}
            ui/${{ steps.updater.outputs.signature }}
            ui/${{ steps.updater.outputs.manifest }}
          retention-days: 14

      # ── Cleanup ────────────────────────────────────────────────

      - name: Clean up keychain
        if: always() && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
