execution_context:
  budget_tier: standard
  launch_channel: dtc
  maturity_stage: launch-ready
  depth_level: comprehensive
  tone: premium
  quality_bar: premium
brand:
  name: HeyZack
  tagline: AI Automation for Residential & Commercial Buildings
  archetype: The Helpful Expert
  voice: Direct, confident, helpful, transparent, knowledgeable
  domain: AI-Powered Smart Home & Commercial Building Automation
  domain_tags:
  - dtc
  - enterprise
  - app
  - mobile
  - ecommerce
  - web
  - social
  - physical-product
  - brand-system
theme:
  name: Intelligent Spaces in Motion
  description: A clean, premium smart-building aesthetic that blends real devices,
    real environments, and blue-to-pink energy accents without falling into sci-fi
    cliches.
  metaphor: An invisible conductor synchronizing climate, access, lighting, security,
    and energy across every room and property.
  mood_keywords:
  - intelligent
  - trustworthy
  - modern
  - connected
  - efficient
  - premium
  - human-centered
  - responsive
  - architectural
  - retrofit-friendly
palette:
  primary:
    name: HeyZack Blue
    hex: '#243984'
    role: 60% backgrounds, major surfaces, UI anchors
  secondary:
    name: Light Grey
    hex: '#E9EDEF'
    role: 30% cards, contrast fields, interface surfaces
  accent:
    name: HeyZack Pink
    hex: '#E82F89'
    role: 10% highlights, CTAs, active states, logo energy
  support:
    name: HeyZack Black
    hex: '#2E2D2C'
    role: Text, hardware housings, premium grounding
  signal:
    name: Savings Green
    hex: '#22C55E'
    role: Positive metrics, efficiency gains, ROI indicators
typography:
  header:
    font: SF Pro Display
    weights:
    - Medium
    - Semibold
    - Bold
    display_weight: Bold
    emphasis_weight: Semibold
    case: title case
  body:
    font: SF Pro Text
    weights:
    - Regular
    - Medium
  data:
    font: SF Mono
    weights:
    - Regular
    - Medium
materials:
- brushed aluminum
- tempered glass
- matte polycarbonate
- smoked acrylic
- satin black steel
- powder-coated white metal
- soft-touch silicone
- edge-lit LED acrylic
- stainless fasteners
- architectural plaster
- natural oak
- dark stone countertops
photography:
  style: Premium real-world product photography with natural daylight, practical lighting,
    and devices shown in lived-in homes and operational commercial spaces.
  environment: Modern apartments, entryways, meeting rooms, boutique hospitality spaces,
    and control corners that feel occupied and believable.
  constraint: No stock-photo cliches. No sterile all-white showrooms. No sci-fi holograms.
    Prefer real hands, candid use, and product-in-context framing.
  camera: Sony A7R V, 35mm and 50mm prime lenses, natural daylight plus practical
    interior lighting
illustration:
  style: Clean technical illustration with rounded iconography, subtle architectural
    linework, and blue-to-pink energy flow accents.
  references: Apple keynote graphics, premium proptech pitch systems, smart-home dashboard
    illustration, and modern outlined icon families
sigil:
  description: A stylized pink Z mark with rounded contours and forward-leaning motion
  components:
  - forward-leaning Z silhouette
  - rounded ribbon geometry
  - pink energy core
audience:
  persona_name: The Efficiency-Minded Space Operator
  aesthetic_affinity: clean modern tech, premium simplicity, architectural calm, and
    tools that look competent rather than flashy
  aspirational_brands: Apple, Sonos, Nest, Tesla
  emotional_register: relief, confidence, operational control, and visible progress
competitive_context:
  avoid_visual_patterns: generic smart-home stock rooms, neon cyberpunk holograms,
    cheesy futuristic HUD overlays, staged handshake business photography, over-posed
    family smiles
  differentiate_from: Nest and SmartThings on home simplicity, Apple HomeKit on privacy
    philosophy, Honeywell and Johnson Controls on commercial scale, Home Assistant
    on complexity
  occupy_territory: consumer-simple, operator-grade building automation with real
    AI learning, visible savings, and no vendor lock-in
positioning:
  statement: The only AI-powered automation platform that scales from single homes
    to unlimited commercial properties with genuine learning intelligence, one unified
    app, and measurable savings.
  hero_headline: Give Your Spaces the Future
  identity_pillars:
  - genuine AI learning
  - one-app unified control
  - portfolio-scale simplicity
  - measurable savings
products:
  hero:
    name: HeyZack Smart Control Panel
    description: The central command surface for climate, lighting, access, cameras,
      and energy across homes and buildings.
    physical_form: a slim wall-mounted smart control panel with matte-black housing,
      tempered-glass face, crisp blue-and-pink interface accents, and live widgets
      for climate, access, security, and energy savings
  capsule_lineup:
  - name: Smart Control Panel
    description: glass-front command panel with multi-zone automation dashboard
  - name: 2K Video Doorbell
    description: weatherproof doorbell camera with two-way audio and motion alerts
  - name: Smart Door Lock
    description: minimal keypad lock with secure app access and clean architectural
      hardware
  - name: Smart DIY Breaker
    description: energy-monitoring breaker module with live usage data and automation
      triggers
  detail:
    name: Smart Control Panel Detail
    focus: the tempered-glass face, refined edge finish, tactile UI hierarchy, blue-to-pink
      highlight states, and energy or occupancy widgets that feel production-ready
  flatlay_objects:
    count: 6
    items:
    - HeyZack smart control panel
    - 2K video doorbell
    - smart door lock module
    - smart DIY breaker
    - curtain controller remote
    - smartphone showing the unified HeyZack app dashboard
  category: AI-powered smart building device ecosystem
aesthetic:
  hero_object_type: connected smart-building device ecosystem
  hero_surface: real architectural surfaces like stone counters, oak credenzas, and
    conference tables
  seal_material: gloss-coated enamel with illuminated edge detail
  seal_geometry: forward-leaning angular ribbon precision
  logo_treatment: illuminated glass-and-enamel mark
  logo_substrate: tempered glass control surface
  panel_structure: clean device interfaces, architectural lines, and subtle energy
    overlays
  icon_line_style: rounded-outline technical iconography with clean consistent stroke
    weight
  poster_artifact: smart-building control artifact
  poster_filament: blue-to-pink energy flow accents
  poster_border: clean rounded technical frame
  quality_reference: Apple keynote system meets premium proptech campaign
  engraving_style: clean technical line illustration
  seeker_inner_detail: device states, ambient energy pathways, and architectural interface
    geometry
  sequence_type: connected-device usage narrative
  sequence_constraint: real-environment usage
  template_variant_2b: geometric_mark
  template_variant_2c: flat_modern
  template_variant_3c: technical_detail
  template_variant_5a: circuit_filigree
  template_variant_5c: abstract_geometry
  template_variant_7a: usage_moments
  template_variant_8a: material_presence
logo_files:
  primary: logo-wordmark.png
  icon: logo-icon.png
negative_prompt: 'cyberpunk neon, sci-fi holograms, floating UI with no device, generic
  stock family smiles,

  generic corporate handshake, all-white sterile showroom, clumsy smart-home cliche,

  unrealistic futuristic architecture, glossy toy-like plastic, cartoon, anime, watermark,

  text overlay, blurry, low resolution, distorted anatomy, fake app UI, random vendor
  logos

  '
generation:
  output_dir: generated
  seeds:
  - 42
  - 137
  resolution: 2K
  output_format: png
  env_file: ~/.claude/.env
  provider: fal
  visual_backend: scripts
  reference_overrides: {}
prompts:
  products:
  - capsule_collection
  - hero_product
  - product_detail
  extended:
    app_icon: '{brand_name} app icon for a smart home and building automation platform.

      Use a solid {primary_name} ({primary_hex}) field with the stylized pink Z mark

      as the unmistakable focal point. Preserve the established brand icon faithfully,

      with refined glow, subtle depth, and no extra symbols or text. Clean, premium,

      App Store-ready, and instantly legible at small sizes.

      '
    og_image: '{brand_name} Open Graph image for a premium automation brand.

      Show the {product_hero_name} paired with a believable mobile app view and hints

      of both residential and commercial environments. Headline: "{brand_tagline}".

      Use {primary_name} ({primary_hex}) as the anchor field and {accent_name}

      ({accent_hex}) as the kinetic highlight. Real product, real architecture, no
      sci-fi.

      '
    app_screenshot: '{brand_name} app screenshot inside a modern phone frame. Show
      a polished,

      believable control dashboard for lighting, climate, access, cameras, and energy,

      with a premium blue-and-pink UI language. Include live savings metrics,

      scene controls, and device cards that feel production-ready for both homes and

      commercial spaces. Avoid fantasy HUDs or generic template UI.

      '
    pitch_hero: '{brand_name} investor and partner deck hero slide. Show the {product_hero_name},

      a mobile app companion screen, and subtle architectural context spanning smart
      home

      and commercial environments. Headline: "{hero_headline}". The composition should

      feel keynote-grade, premium, and operationally credible, with real-device realism

      and strong blue-to-pink brand energy.

      '
    twitter_header: '{brand_name} Twitter/X header banner. Panoramic composition featuring
      the

      HeyZack control ecosystem across home and building contexts, anchored by

      the brand wordmark and the idea of one app controlling everything. Use

      {primary_name} ({primary_hex}) as the dominant field with elegant

      {accent_name} ({accent_hex}) motion accents. Clean, sharp, and unmistakably
      tech.

      '
    email_hero: '{brand_name} email hero image. A warm, premium scene with the {product_hero_name},

      a mobile dashboard glimpse, and believable architectural context. Emphasize
      comfort,

      control, and savings rather than spectacle. Keep the layout clean for marketing

      email use, with brand mark visibility and polished real-world lighting.

      '
