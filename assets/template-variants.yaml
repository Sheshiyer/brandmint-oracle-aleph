            Deep cast shadows. "{brand_name}" wordmark in {header_font} {header_display_weight},
            {header_case}, layered over subtle {primary_name} pattern at 12% opacity.
            Block 2 (The Craft Detail): Three tight macro shots in a horizontal strip —
            surface material texture, craft technique in progress, {accent_name} ({accent_hex}) tone.
            Each shot shows the hand of the maker, the grain of the material.
            Block 3 (The Color As Material): 5 color swatches rendered as physical material samples —
            {primary_hex} in terracotta grain, {secondary_hex} in ivory linen, {accent_hex} in metallic foil,
            {support_hex} in aged paper, {signal_hex} in living moss. Each labeled in {data_font}.
            Block 4 (The Heritage Type): "{header_font}" at large display size.
            Pattern of {theme_metaphor} at 8% opacity behind letterforms. Historical typography energy.
            Block 5 (The Sigil Origin): {sigil_description}. {sigil_components}.
            Rendered as engraving on {hero_surface} — deep relief, {accent_name} patina.
            Block 6 (The Chronicle): "{brand_name}" | EST. MMXXVI | "{archetype}" | {voice}.
            Dense manifesto text at small scale. {primary_name} background, {secondary_name} type.
            Block 7 (The Territory): Visual positioning — "{occupy_territory}".
            {theme_description} rendered as a conceptual diagram with {data_font} annotations.
            Block 8 (The Material Archive): {materials_list} — each material photographed in macro
            against {secondary_name} background with {accent_name} ({accent_hex}) side-light.
          lighting: "Warm raking light from upper left, deep cast shadows, {accent_name} temperature"
          shadow_quality: "deep warm cast shadows, high contrast, tonal richness"
          surface_texture: "visible material grain, tactile surfaces, paper texture on all panels"
          spatial_instruction: "Ornamental dividers between modules. Pattern at 8% opacity on all panels. Dense, layered. Every edge carries intention."
          color_application: "rich saturation throughout, {accent_name} on every panel, {primary_name} as deep anchoring ground"
          atmosphere: "Vogue India / Architectural Digest heritage editorial gravitas"

      futuristic_editorial:
        description: "4-module asymmetric dramatic — full-bleed, technical overlays, cold precision"
        aesthetic_tags:
          composition_density: [moderate, dense]
          temporal_register: [speculative, futuristic]
          material_richness: [synthetic, minimal]
          visual_boldness: [bold, architectural]
          editorial_vs_commercial: [editorial]
        template_variables:
          layout_format: "Technical Editorial Layout"
          module_count: "4 asymmetric modules, 2 full-bleed, maximum contrast"
          typography_treatment: "{data_font} for all technical annotations and callouts. {header_font} {header_display_weight} at maximum scale for headlines only. No decorative type."
          layout_blocks: |
            Block 1 (The System): Full-bleed dramatic overhead photograph of {product_hero_physical}
            against {primary_name} ({primary_hex}) ground. Cold single directional light, hard shadows.
            Technical annotation lines in {data_font} at {signal_name} ({signal_hex}) — callouts
            pointing to material details, measurements, structural notes. No warmth. Pure precision.
            "{brand_name}" in {data_font} at small scale, upper-left corner only.
            Block 2 (The Signal): "{hero_headline}" in {header_font} {header_display_weight}
            at maximum typographic scale. {signal_name} ({signal_hex}) on {primary_name} ({primary_hex}).
            No pattern. No texture. No image. The headline IS the design.
            Single 1px {signal_name} rule at bottom, full width.
            Block 3 (The Architecture): {identity_pillars} rendered as connected node diagram.
            {data_font} labels. {signal_name} ({signal_hex}) connecting lines on {primary_name}.
            Engineering-drawing precision. No decorative elements. No color beyond signal.
            Block 4 (The Spectrum): 5 color columns at full module height.
            {primary_hex} | {secondary_hex} | {accent_hex} | {support_hex} | {signal_hex}.
            HEX code in {data_font} at bottom of each column. Digital precision, no material texture.
          lighting: "Single cold directional light source, hard edge shadows, {signal_name} ambient glow"
          shadow_quality: "hard geometric shadows, cold tonal range, no gradients"
          surface_texture: "seamless surfaces, no material grain, reflective or matte only"
          spatial_instruction: "Zero wasted space. Every edge is intentional. No decorative elements whatsoever."
          color_application: "high contrast — deep {primary_name} fields, {signal_name} glow accents, nothing in between"
          atmosphere: "Wired / Fast Company digital precision editorial"

