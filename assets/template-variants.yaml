# Brandmint — Template Variant Registry
# Dynamic template structure selection based on brand aesthetic profile.
#
# Each asset has:
#   default:   variant_id to use when classifier is absent or ambiguous
#   variants:  dict of variant_id → definition
#
# Variant definition:
#   description:      human-readable summary
#   aesthetic_tags:   dimensions used by TemplateMatcher for scoring
#     composition_density:   [sparse|moderate|dense|ornate]
#     temporal_register:     [speculative|contemporary|heritage|ancestral]
#     material_richness:     [synthetic|minimal|natural|craft]
#     visual_boldness:       [subtle|refined|balanced|bold|architectural]
#     editorial_vs_commercial: [editorial|balanced|commercial]
#   template_variables: injected into v dict as {asset_id_varname}
#                       can contain {brand_variable} references (resolved by render())
#
# Phase A: each asset has one default variant with empty template_variables.
# Phase B: classifier weight tables calibrated to known brands.
# Phase C: 2A gains 4 real structural variants with ~12 template_variables each.
# Phase D: all 13 assets gain full variant coverage.

variants:

  # ═══════════════════════════════════════════════════════════════════════
  # IDENTITY ASSETS
  # ═══════════════════════════════════════════════════════════════════════

  2A:
    name: "Brand Kit Bento Grid"
    default: standard_bento
    variants:

      standard_bento:
        description: "6-module structured grid — hero, social, palette, type, sigil, brand DNA"
        aesthetic_tags:
          composition_density: [moderate]
          temporal_register: [contemporary]
          material_richness: [moderate]
          visual_boldness: [balanced]
          editorial_vs_commercial: [editorial]
        template_variables:
          layout_format: "Bento-Grid Layout"
          module_count: "6 distinct modules"
          typography_treatment: "{header_font} (headers, {header_display_weight}/{header_emphasis_weight}, {header_case}). {body_font} (body)."
          layout_blocks: |
            Block 1 (The Hero): High-contrast photograph of a {product_hero_physical} resting on
            {hero_surface} inside {photo_environment}. Warm {accent_name} light.
            Materials: {materials_list}. Overlay "{brand_name}" wordmark in
            {secondary_name} ({secondary_hex}), {header_font} {header_display_weight}, {header_case}.
            Block 2 (Social Media): Instagram Post mockup -- {primary_name} ({primary_hex})
            background with subtle pattern overlay at 5% opacity, centered text in {header_font}:
            "{hero_headline}" {accent_name} accent line below.
            Block 3 (The Palette): 5 Vertical Color Swatches -- {primary_hex}, {secondary_hex},
            {accent_hex}, {support_hex}, {signal_hex}. Simulated HEX codes.
            Block 4 (Typography Spec): "{header_font}" displayed prominently. Tiny "Primary
            Typeface" subtext in {body_font}.
            Block 5 (The Sigil): {sigil_description}. {sigil_components}.
            Block 6 (Brand DNA): Manifesto Card -- ARCHETYPE: "{archetype}."
            VOICE: "{voice}." POSITIONING: "{positioning_statement}."
            PILLARS: {identity_pillars}. VISUALS: "{theme_description}."
          lighting: "Soft studio lighting with {accent_name} rim accent"
          shadow_quality: "soft graduated shadows, no harsh edges"
          surface_texture: "polished surface, material grain subtly visible"
          spatial_instruction: "Sharp edges, 1px {support_name} borders. Generous white space."
          color_application: "{primary_name} dominant backgrounds, {accent_name} highlights at 10%"
          atmosphere: "{quality_reference}"

      minimal_zen:
        description: "3-module sparse layout — dominant negative space, single object, typographic essence"
        aesthetic_tags:
          composition_density: [sparse]
          temporal_register: [contemporary, heritage]
          material_richness: [natural, minimal]
          visual_boldness: [subtle, refined]
          editorial_vs_commercial: [editorial]
        template_variables:
          layout_format: "Sparse Editorial Layout"
          module_count: "3 spacious modules with dominant negative space"
          typography_treatment: "{body_font} Light, generous leading, wide letter-spacing. No heavy weights."
          layout_blocks: |
            Block 1 (The One Object): Single {product_hero_physical} floating in a vast field of
            {primary_name} ({primary_hex}). Centered. No surface visible. No environment context.
            Breathing room on all four sides equal to the object's width. Diffuse overhead light only.
            No cast shadows. No reflections. The object simply exists.
            Overlay "{brand_name}" wordmark, {body_font} Light, {header_case}, {secondary_name},
            placed at bottom-left in small point size. Nothing else in this module.
            Block 2 (The Word): "{brand_tagline}" typeset alone in {body_font} Light,
            {header_case}, {secondary_name} ({secondary_hex}) on {primary_name} ({primary_hex}) field.
            Type centered vertically and horizontally. Point size at approximately 60% of module width.
            Vast negative space above and below. No decorative elements. No borders.
            Block 3 (The Mark): {sigil_description} alone on {secondary_name} ({secondary_hex}) field.
            The mark at 40% of module size, centered. No label. No supporting text. No context.
            {accent_name} ({accent_hex}) as a single line of 1px below the mark, 30% module width.
          lighting: "Diffuse overhead light, no directional source, no shadows"
          shadow_quality: "no shadows, objects appear to float without weight"
          surface_texture: "seamless color field, no visible texture or grain"
          spatial_instruction: "No borders. No grid lines. Vast negative space. Each object breathes."
          color_application: "monochromatic primary field, single {accent_name} touch per module maximum"
          atmosphere: "Kinfolk / Cereal magazine editorial clarity"

