          module_count: "8 layered modules with ornamental dividers and pattern overlays"
          typography_treatment: "{header_font} {header_display_weight} mixed with {body_font} Light. Pattern at 8% behind display type. Mixed weights throughout."
          layout_blocks: |
            Block 1 (The Ceremony): {product_hero_physical} arranged with {materials_list} visible
