# ============================================================================
# Brandmint Skills Manifest
# ============================================================================
# All 29 text-generating skills organized by logical parts.
# Adapted from the original claude-skills-workbench orchestrator manifest
# with brandmint-specific file paths.
#
# Paths are relative to the repository root.
# Each skill has: id, name, path (template), placeholder, required_keys, upstream
# ============================================================================

parts:
  - id: part-1
    name: Understanding the Market
    status_placeholder: STATUS_PART_1
    skills:
      - id: niche-validator
        name: Niche Validator
        path: skills/text-strategy/niche-validator/templates/niche-viability-report.md
        placeholder: PATH_NICHE_VALIDATOR
        required_keys: []
        upstream: []

      - id: buyer-persona
        name: Buyer Persona
        path: skills/text-strategy/buyer-persona/templates/persona-dossier.md
        placeholder: PATH_PERSONA
        required_keys:
          - meta_project.product_name
          - meta_project.persona_name
          - meta_project.tone_source
          - voice_samples
          - emotional_drivers
        upstream: []

      - id: competitor-analysis
        name: Competitor Intelligence
        path: skills/text-strategy/competitor-analysis/templates/competitor-intelligence.md
        placeholder: PATH_COMPETITOR
        required_keys:
          - market_gaps
          - verified_anxieties
          - technical_benchmark.materials
          - technical_benchmark.dimensions
        upstream: []

  - id: part-2
    name: Product Detailing
    status_placeholder: STATUS_PART_2
    skills:
      - id: detailed-product-description
        name: Detailed Product Description
        path: skills/campaign-copy/detailed-product-description/templates/detailed-product-description.md
        placeholder: PATH_DPD
        required_keys:
          - product.name
          - product.price
          - specs.dimensions
          - specs.materials
        upstream:
          - buyer-persona
          - competitor-analysis

      - id: product-positioning-summary
        name: Product Positioning Summary
        path: skills/text-strategy/product-positioning-summary/templates/product-positioning-summary.md
        placeholder: PATH_POSITIONING
        required_keys:
          - cbbe.salience
          - cbbe.performance
          - cbbe.imagery
          - cbbe.judgments
          - cbbe.feelings
          - cbbe.resonance
        upstream:
          - buyer-persona
          - competitor-analysis

      - id: mds-messaging-direction-summary
        name: MDS
        path: skills/text-strategy/mds-messaging-direction-summary/templates/mds.md
        placeholder: PATH_MDS
        required_keys:
          - handoff.pitch
          - handoff.usp
          - handoff.objections
          - handoff.emotions
        upstream:
          - product-positioning-summary

      - id: voice-and-tone
        name: Voice and Tone
        path: skills/text-strategy/voice-and-tone/templates/voice-and-tone.md
        placeholder: PATH_VOICE
        required_keys:
          - voice.tones
          - voice.persona
          - voice.culture
          - voice.lingo
          - voice.emotions
        upstream:
          - buyer-persona
          - mds-messaging-direction-summary

